<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroTrack — Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-wrapper {
      min-height: calc(100vh - 72px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
    }
    .auth-card {
      max-width: 420px;
      width: 100%;
      padding: var(--space-xl);
    }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header h1 { font-size: 1.75rem; margin-bottom: 8px; }
    .auth-header p { color: var(--text-secondary); font-size: 0.9375rem; }
    
    .toggle-link {
      margin-top: 24px;
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    .toggle-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    .toggle-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-content">
      <a href="index.html" class="nav-brand">
        <div class="logo-icon">🧠</div>
        <span>NeuroTrack</span>
      </a>
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌓</button>
        <button class="nav-toggle" id="navToggle">☰</button>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="chat.html">Chat</a></li>
          <li><a href="mood.html">Mood</a></li>
          <li><a href="suggestions.html">Tips</a></li>
          <li id="authNavItem"><a href="login.html" class="btn btn-sm btn-outline">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="card auth-card">
      <div class="auth-header">
        <h1 id="authTitle">Welcome Back</h1>
        <p id="authSub">Sign in to your NeuroTrack account.</p>
      </div>

      <form id="authForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;" id="submitBtn">Sign In</button>
      </form>

      <div class="toggle-link">
        <span id="toggleText">Don't have an account?</span>
        <a id="toggleMode">Create one</a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, loginEmail, signupEmail, showToast, setLoading } from './js/api.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    // Theme Toggle
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    const themeToggle = document.getElementById('themeToggle');
    

    themeToggle.onclick = () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    };
    

    let isSignup = false;
    const form = document.getElementById('authForm');
    const toggleBtn = document.getElementById('toggleMode');
    const title = document.getElementById('authTitle');
    const sub = document.getElementById('authSub');
    const submitBtn = document.getElementById('submitBtn');

    onAuthStateChanged(auth, (user) => { if (user) window.location.href = 'index.html'; });

    toggleBtn.onclick = () => {
      isSignup = !isSignup;
      title.textContent = isSignup ? 'Create Account' : 'Welcome Back';
      sub.textContent = isSignup ? 'Start your journey to better mental health.' : 'Sign in to your NeuroTrack account.';
      submitBtn.textContent = isSignup ? 'Get Started' : 'Sign In';
      document.getElementById('toggleText').textContent = isSignup ? 'Already have an account?' : "Don't have an account?";
      toggleBtn.textContent = isSignup ? 'Sign In' : 'Create one';
    };

    form.onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      setLoading(submitBtn, true);
      try {
        if (isSignup) { await signupEmail(email, pass); showToast('Account created!', 'success'); }
        else { await loginEmail(email, pass); }
        window.location.href = 'index.html';
      } catch (e) { showToast(e.message, 'error'); }
      finally { setLoading(submitBtn, false); }
    };
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const navToggle = document.getElementById('navToggle');
      const navLinks = document.getElementById('navLinks');
      if(navToggle && navLinks) {
        navToggle.addEventListener('click', () => {
          navLinks.classList.toggle('show');
          navToggle.textContent = navLinks.classList.contains('show') ? '✕' : '☰';
        });
        document.querySelectorAll('.nav-links a').forEach(link => {
          link.addEventListener('click', () => {
            navLinks.classList.remove('show');
            navToggle.textContent = '☰';
          });
        });
      }
    });
  </script>
</body>
</html>
