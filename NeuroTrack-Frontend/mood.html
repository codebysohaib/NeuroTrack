<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroTrack — Mood Tracker</title>
  <meta name="description" content="Log and track your daily moods with NeuroTrack." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .mood-selector {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .intensity-box {
      background: var(--surface-2);
      padding: 16px 20px;
      border-radius: var(--radius);
      margin: 16px 0;
    }
    .intensity-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .intensity-val {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }
    .history-card {
      padding: 0;
      overflow: hidden;
    }
    .history-item {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }
    .history-item:last-child { border-bottom: none; }
    .history-mood { text-align: center; }
    .history-mood .emoji { font-size: 1.875rem; display: block; }
    .history-mood .label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
    .history-body .note { font-size: 0.9375rem; color: var(--text); margin-bottom: 8px; line-height: 1.5; word-break: break-word; }
    .history-body .meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .history-time { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; text-align: right; }
    
    .pill-intensity { font-size: 0.75rem; font-weight: 700; padding: 2px 10px; border-radius: 12px; }

    .mood-page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 600px) {
      .history-item {
        grid-template-columns: 60px 1fr;
        gap: 10px;
      }
      .history-time {
        grid-column: 1 / -1;
        text-align: left;
        padding-top: 8px;
        border-top: 1px dashed var(--border);
        white-space: normal;
      }
      .mood-selector {
        grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
        gap: 8px;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-content">
      <a href="index.html" class="nav-brand">
        <div class="logo-icon">🧠</div>
        <span>NeuroTrack</span>
      </a>
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌓</button>
        <button class="nav-toggle" id="navToggle">☰</button>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="chat.html">Chat</a></li>
          <li><a href="mood.html" class="active">Mood</a></li>
          <li><a href="suggestions.html">Tips</a></li>
          <li id="authNavItem"><a href="login.html" class="btn btn-sm btn-outline">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="auth-status-bar">
    <div class="container auth-status-content">
      <div class="user-badge">
        <span id="userTypeIcon">👤</span>
        <span id="userDisplayName">Loading...</span>
      </div>
      <div id="authActionText"></div>
    </div>
  </div>

  <main class="container main">
    <div class="grid grid-2">
      <!-- Left: Form -->
      <section>
        <div class="card">
          <h2 style="margin-bottom: 8px;">Log Mood</h2>
          <p style="margin-bottom: 24px; font-size: 0.875rem;">How are you feeling right now?</p>

          <div class="form-group">
            <label>Select Mood</label>
            <div class="mood-selector" id="moodGrid"></div>
          </div>

          <div class="intensity-box">
            <div class="intensity-header">
              <label style="margin-bottom:0">Intensity Level</label>
              <span class="intensity-val" id="intensityDisplay">5</span>
            </div>
            <input type="range" id="intensityRange" min="1" max="10" value="5" style="margin: 10px 0" />
            <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:var(--text-muted); font-weight:700">
              <span>MILD</span>
              <span>EXTREME</span>
            </div>
          </div>

          <div class="form-group">
            <label>Notes (What's on your mind?)</label>
            <textarea id="moodNote" placeholder="Optional notes about your day..." rows="4"></textarea>
          </div>

          <button class="btn btn-primary" id="logBtn" style="width:100%">📝 Log Entry</button>
        </div>
      </section>

      <!-- Right: History -->
      <section>
        <div class="mood-page-header">
          <h2 style="font-size: 1.25rem;">Recent History</h2>
          <select id="moodFilter" class="btn btn-sm btn-outline" style="width:auto; padding:6px 12px">
            <option value="">All Moods</option>
          </select>
        </div>

        <div class="card history-card" id="historyContent">
          <div style="padding:40px; text-align:center; color:var(--text-muted)">Loading your history...</div>
        </div>
      </section>
    </div>
  </main>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, saveMood, getMoodHistory, getUserId, showToast, moodEmoji, MOOD_META, formatDate, setLoading } from './js/api.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    // ── Theme Manager ─────────────────────────────────────────────────────────
    const themeToggle = document.getElementById('themeToggle');
    
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    themeToggle.onclick = () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    };
    

    // ── Auth & Init ─────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      const nameEl = document.getElementById('userDisplayName');
      if (user) {
        nameEl.textContent = user.email || 'User';
      } else {
        nameEl.textContent = 'Guest Mode';
      }
      loadHistory();
    });

    // ── Mood Selection ─────────────────────────────────────────────────────────
    const moodGrid = document.getElementById('moodGrid');
    const moodFilter = document.getElementById('moodFilter');
    let selectedMood = '';

    Object.entries(MOOD_META).forEach(([key, { emoji, label }]) => {
      // Form button
      const btn = document.createElement('button');
      btn.className = 'mood-btn';
      btn.innerHTML = `<span>${emoji}</span><small style="font-weight:700; font-size:0.65rem; text-transform:uppercase">${label}</small>`;
      btn.onclick = () => {
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedMood = key;
      };
      moodGrid.appendChild(btn);

      // Filter option
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = `${emoji} ${label}`;
      moodFilter.appendChild(opt);
    });

    // ── Intensity ─────────────────────────────────────────────────────────────────
    const range = document.getElementById('intensityRange');
    const display = document.getElementById('intensityDisplay');
    range.oninput = () => display.textContent = range.value;

    // ── Log Mood ──────────────────────────────────────────────────────────────────
    document.getElementById('logBtn').onclick = async () => {
      if (!selectedMood) return showToast('Please select a mood', 'warning');
      const btn = document.getElementById('logBtn');
      const note = document.getElementById('moodNote').value;
      setLoading(btn, true);
      try {
        await saveMood(getUserId(), selectedMood, note, parseInt(range.value));
        showToast('Mood logged successfully', 'success');
        document.getElementById('moodNote').value = '';
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
        selectedMood = '';
        loadHistory();
      } catch (e) {
        showToast(e.message, 'error');
      } finally {
        setLoading(btn, false);
      }
    };

    // ── Load History ──────────────────────────────────────────────────────────────
    async function loadHistory() {
      const el = document.getElementById('historyContent');
      const filter = moodFilter.value;
      try {
        const data = await getMoodHistory(getUserId(), 20, filter);
        if (!data.history?.length) {
          el.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-muted)">No entries found.</div>`;
          return;
        }
        el.innerHTML = data.history.map(h => `
          <div class="history-item">
            <div class="history-mood">
              <span class="emoji">${moodEmoji(h.mood)}</span>
              <span class="label">${h.mood}</span>
            </div>
            <div class="history-body">
              <div class="note">${h.note || '<i style="color:var(--text-muted)">No notes added</i>'}</div>
              <div class="meta">
                <span class="pill-intensity" style="background:${getIntensityBg(h.intensity)}; color:${getIntensityColor(h.intensity)}">Intensity: ${h.intensity}/10</span>
              </div>
            </div>
            <div class="history-time">${formatDate(h.timestamp)}</div>
          </div>
        `).join('');
      } catch (e) {
        el.innerHTML = `<div style="padding:40px; text-align:center; color:var(--error)">Error loading history.</div>`;
      }
    }

    function getIntensityBg(v) { if(v <= 3) return 'var(--success-lt)'; if(v <= 7) return 'var(--warning-lt)'; return 'var(--error-lt)'; }
    function getIntensityColor(v) { if(v <= 3) return 'var(--success)'; if(v <= 7) return 'var(--warning)'; return 'var(--error)'; }

    moodFilter.onchange = loadHistory;
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const navToggle = document.getElementById('navToggle');
      const navLinks = document.getElementById('navLinks');
      if(navToggle && navLinks) {
        navToggle.addEventListener('click', () => {
          navLinks.classList.toggle('show');
          navToggle.textContent = navLinks.classList.contains('show') ? '✕' : '☰';
        });
        document.querySelectorAll('.nav-links a').forEach(link => {
          link.addEventListener('click', () => {
            navLinks.classList.remove('show');
            navToggle.textContent = '☰';
          });
        });
      }
    });
  </script>
</body>
</html>
