<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroTrack — Wellness Tips</title>
  <meta name="description" content="AI-generated wellness tips tailored to your mood." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .mood-box {
      background: var(--surface);
      padding: 32px;
      border-radius: var(--radius-lg);
      text-align: center;
      margin-bottom: 32px;
    }
    .mood-flex {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
    }
    .tip-result-card {
      background: var(--primary-lt);
      border: 1px solid var(--primary);
      padding: 32px;
      border-radius: var(--radius-lg);
      margin-bottom: 32px;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .tip-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }
    .tip-item-card {
      background: var(--surface);
      padding: 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .tip-item-card .icon { font-size: 1.5rem; }
    .tip-item-card .text { font-size: 0.9375rem; line-height: 1.6; color: var(--text); }

    .loading-shimmer {
      height: 200px;
      background: var(--surface-2);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      animation: shimmer 1.5s infinite linear;
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-content">
      <a href="index.html" class="nav-brand">
        <div class="logo-icon">🧠</div>
        <span>NeuroTrack</span>
      </a>
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="theme-toggle" id="themeToggle">🌓</button>
        <ul class="nav-links">
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="chat.html">Chat</a></li>
          <li><a href="mood.html">Mood</a></li>
          <li><a href="suggestions.html" class="active">Tips</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="auth-status-bar">
    <div class="container auth-status-content">
      <div class="user-badge">
        <span id="userTypeIcon">👤</span>
        <span id="userDisplayName">Connecting...</span>
      </div>
      <div id="authActionText"></div>
    </div>
  </div>

  <main class="container main">
    <header style="margin-bottom: 40px; text-align: center;">
      <h1 style="font-size: 2.25rem; margin-bottom: 8px;">Personalized Tips</h1>
      <p style="color: var(--text-secondary)">Get AI-powered wellness suggestions based on your current state.</p>
    </header>

    <section class="mood-box card">
      <h3 style="color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;">Step 1: Select your current mood</h3>
      <div class="mood-flex" id="moodGrid"></div>
    </section>

    <div id="tipsLoading" style="display:none;" class="loading-shimmer">
      Generating custom tips for you...
    </div>

    <section id="tipsResult" style="display:none;">
      <div class="tip-result-card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h2 id="resultTitle">Results</h2>
          <button class="btn btn-sm btn-primary" id="refreshBtn">🔄 Refresh Tips</button>
        </div>
        <div class="tip-list" id="tipsGrid"></div>
      </div>
    </section>

    <section style="margin-top: 60px;">
      <h2 style="font-size: 1.5rem; margin-bottom: 24px;">Explore Other Moods</h2>
      <div class="grid grid-3" id="libraryGrid">
        <!-- Static fallback library items -->
      </div>
    </section>
  </main>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, getSuggestions, getSupportedMoods, showToast, MOOD_META } from './js/api.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    // ── Theme Manager ─────────────────────────────────────────────────────────
    const themeToggle = document.getElementById('themeToggle');
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    themeToggle.onclick = () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    };

    // ── Auth Init ─────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      document.getElementById('userDisplayName').textContent = user ? user.email : 'Guest Mode';
    });

    const moodGrid = document.getElementById('moodGrid');
    const libraryGrid = document.getElementById('libraryGrid');
    let activeMood = '';

    // ── Build UI ─────────────────────────────────────────────────────────────
    async function init() {
      try {
        const data = await getSupportedMoods();
        data.supported_moods.forEach(mood => {
          const meta = MOOD_META[mood] || { emoji: '🙂', label: mood };
          
          // Selection Button
          const btn = document.createElement('button');
          btn.className = 'mood-btn';
          btn.innerHTML = `<span>${meta.emoji}</span><small style="font-weight:700; text-transform:uppercase; font-size:0.65rem">${meta.label}</small>`;
          btn.onclick = () => {
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            activeMood = mood;
            loadTips(mood);
          };
          moodGrid.appendChild(btn);

          // Library Card
          const libCard = document.createElement('div');
          libCard.className = 'card';
          libCard.style.cursor = 'pointer';
          libCard.innerHTML = `
            <div style="font-size:1.5rem; margin-bottom:12px">${meta.emoji}</div>
            <h4 style="text-transform:capitalize; margin-bottom:8px">${mood}</h4>
            <p style="font-size:0.8125rem">Get AI-generated coping strategies for when you're feeling ${mood}.</p>
          `;
          libCard.onclick = () => { window.scrollTo({ top: 200, behavior: 'smooth' }); btn.click(); };
          libraryGrid.appendChild(libCard);
        });
      } catch (e) {
        showToast('Error loading moods', 'error');
      }
    }

    async function loadTips(mood) {
      const loading = document.getElementById('tipsLoading');
      const result = document.getElementById('tipsResult');
      const grid = document.getElementById('tipsGrid');
      
      loading.style.display = 'flex';
      result.style.display = 'none';

      try {
        const data = await getSuggestions(mood);
        document.getElementById('resultTitle').textContent = `Tips for feeling ${mood} ${MOOD_META[mood]?.emoji || ''}`;
        grid.innerHTML = data.tips.map(tip => `
          <div class="tip-item-card">
            <div class="icon">💡</div>
            <div class="text">${tip}</div>
          </div>
        `).join('');
        result.style.display = 'block';
      } catch (e) {
        showToast('AI failed to generate tips', 'error');
      } finally {
        loading.style.display = 'none';
      }
    }

    document.getElementById('refreshBtn').onclick = () => { if(activeMood) loadTips(activeMood); };

    init();
  </script>
</body>
</html>
