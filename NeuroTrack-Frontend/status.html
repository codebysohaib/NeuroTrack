<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroTrack — System Status</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .status-card { text-align: center; padding: var(--space-xxl) var(--space-lg); }
    .status-indicator {
      width: 80px; height: 80px; border-radius: 50%;
      margin: 0 auto 24px; display: flex; align-items: center; justify-content: center;
      font-size: 2rem; position: relative;
    }
    .status-indicator::after {
      content: ''; position: absolute; inset: -8px; border-radius: 50%;
      border: 2px solid currentColor; opacity: 0.2;
    }
    .status-online { background: var(--success-lt); color: var(--success); }
    .status-offline { background: var(--error-lt); color: var(--error); }
    
    .detail-row {
      display: flex; justify-content: space-between; padding: 16px 0;
      border-bottom: 1px solid var(--border); font-size: 0.9375rem;
    }
    .detail-row:last-child { border-bottom: none; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-content">
      <a href="index.html" class="nav-brand">
        <div class="logo-icon">🧠</div>
        <span>NeuroTrack</span>
      </a>
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌓</button>
        <button class="nav-toggle" id="navToggle">☰</button>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="chat.html">Chat</a></li>
          <li><a href="mood.html">Mood</a></li>
          <li><a href="suggestions.html">Tips</a></li>
          <li id="authNavItem"><a href="login.html" class="btn btn-sm btn-outline">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container main">
    <div class="card status-card">
      <div id="mainIndicator" class="status-indicator status-offline">?</div>
      <h1 id="statusTitle" style="margin-bottom:8px">Checking System...</h1>
      <p id="statusDesc" style="color:var(--text-secondary)">We're verifying connection to the NeuroTrack servers.</p>

      <div style="max-width:400px; margin: 40px auto 0; text-align: left;">
        <h3 class="card-title">Technical Details</h3>
        <div class="detail-row">
          <span>API Endpoint</span>
          <code style="font-size:0.8rem">neurotrack-0q5m.onrender.com</code>
        </div>
        <div class="detail-row">
          <span>Latency</span>
          <span id="latencyVal">--</span>
        </div>
        <div class="detail-row">
          <span>Version</span>
          <span>1.2.0-stable</span>
        </div>
      </div>

      <button class="btn btn-outline" style="margin-top:40px" onclick="location.reload()">🔄 Recheck Connection</button>
    </div>
  </main>

  <script type="module">
    import { ping } from './js/api.js';

    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    const themeToggle = document.getElementById('themeToggle');
    
    
    themeToggle.onclick = () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    };
    

    async function checkStatus() {
      const start = Date.now();
      const indicator = document.getElementById('mainIndicator');
      const title = document.getElementById('statusTitle');
      const desc = document.getElementById('statusDesc');
      const latency = document.getElementById('latencyVal');

      try {
        await ping();
        const end = Date.now();
        indicator.className = 'status-indicator status-online';
        indicator.textContent = '✓';
        title.textContent = 'System Fully Operational';
        desc.textContent = 'All services are running smoothly. You have full access to AI Chat and Mood tracking.';
        latency.textContent = `${end - start}ms`;
      } catch {
        indicator.className = 'status-indicator status-offline';
        indicator.textContent = '✕';
        title.textContent = 'Connection Issue Detected';
        desc.textContent = 'We are having trouble reaching the backend server. Please check your internet or try again later.';
        latency.textContent = 'Timeout';
      }
    }

    checkStatus();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const navToggle = document.getElementById('navToggle');
      const navLinks = document.getElementById('navLinks');
      if(navToggle && navLinks) {
        navToggle.addEventListener('click', () => {
          navLinks.classList.toggle('show');
          navToggle.textContent = navLinks.classList.contains('show') ? '✕' : '☰';
        });
        document.querySelectorAll('.nav-links a').forEach(link => {
          link.addEventListener('click', () => {
            navLinks.classList.remove('show');
            navToggle.textContent = '☰';
          });
        });
      }
    });
  </script>
</body>
</html>
