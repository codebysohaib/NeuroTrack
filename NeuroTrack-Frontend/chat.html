<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroTrack — AI Chat</title>
  <meta name="description" content="Safe, judgement-free AI support." />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Chat page uses its own main — no .main padding */
    .chat-main {
      flex: 1;              /* fill remaining body flex space */
      display: flex;
      align-items: stretch;
      justify-content: center;
      /* Constrain height so chat doesn't overflow body */
      height: 0;            /* with flex:1 this becomes the actual available height */
      padding: 12px;
      box-sizing: border-box;
    }
    .chat-container {
      display: flex;
      flex-direction: column;
      /* Fill the full height of chat-main */
      height: 100%;
      width: 100%;
      max-width: 820px;
    }
    .chat-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      flex-shrink: 0;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg);
      /* Smooth momentum scrolling on iOS */
      -webkit-overflow-scrolling: touch;
    }
    .chat-input-area {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      flex-shrink: 0;
    }
    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-2);
      padding: 4px 4px 4px 16px;
      border-radius: 24px;
      border: 1px solid var(--border);
    }
    .input-wrapper textarea {
      flex: 1;
      border: none;
      background: transparent;
      padding: 8px 0;
      resize: none;
      max-height: 120px;
      font-size: 1rem;
      line-height: 1.4;
      min-height: 36px;
    }
    .input-wrapper textarea:focus { box-shadow: none; }
    
    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.9375rem;
      line-height: 1.55;
      position: relative;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .bubble.ai { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bubble.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
    .bubble-time { font-size: 0.65rem; color: var(--text-muted); margin-top: 4px; display: block; }
    .user .bubble-time { color: rgba(255,255,255,0.7); text-align: right; }
    
    /* Markdown Styles */
    .bubble p { margin-top: 0; margin-bottom: 8px; }
    .bubble p:last-of-type { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin-top: 0; margin-bottom: 8px; padding-left: 20px; }
    .bubble pre { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; overflow-x: auto; margin-bottom: 8px; }
    [data-theme="dark"] .bubble pre { background: rgba(255,255,255,0.1); }
    .bubble code { background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.85em; }
    [data-theme="dark"] .bubble code { background: rgba(255,255,255,0.1); }
    .bubble pre code { background: transparent; padding: 0; }

    .quick-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; justify-content: center; }
    .chip { padding: 8px 14px; border-radius: 16px; background: var(--surface-2); border: 1px solid var(--border); font-size: 0.8125rem; cursor: pointer; transition: var(--transition); color: var(--text-secondary); touch-action: manipulation; }
    .chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-lt); }

    .thinking { font-style: italic; font-size: 0.8125rem; color: var(--text-muted); padding: 4px 16px 8px; }

    .btn-send {
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: var(--transition);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-send:hover { background: var(--primary-dk); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 7px 14px;
      border-radius: var(--radius-xl);
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .btn-ghost:hover { background: var(--error-lt); border-color: var(--error); color: var(--error); }

    @media (max-width: 768px) {
      .chat-main {
        padding: 8px;
      }
      .chat-messages { padding: 14px 12px; }
      .bubble { max-width: 88%; font-size: 0.9rem; }
      .quick-chips { gap: 6px; }
      .chip { font-size: 0.75rem; padding: 7px 12px; }
    }

    @media (max-width: 480px) {
      .chat-main { padding: 0; }
      .chat-container { border-radius: 0; }
      .chat-header { border-radius: 0; padding: 11px 14px; }
      .chat-input-area { border-radius: 0; }
      .bubble { max-width: 92%; padding: 10px 13px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container nav-content">
      <a href="index.html" class="nav-brand">
        <div class="logo-icon">🧠</div>
        <span>NeuroTrack</span>
      </a>
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌓</button>
        <button class="nav-toggle" id="navToggle">☰</button>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="chat.html" class="active">Chat</a></li>
          <li><a href="mood.html">Mood</a></li>
          <li><a href="suggestions.html">Tips</a></li>
          <li id="authNavItem"><a href="login.html" class="btn btn-sm btn-outline">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="auth-status-bar">
    <div class="container auth-status-content">
      <div class="user-badge">
        <span id="userTypeIcon">👤</span>
        <span id="userDisplayName">Connecting...</span>
      </div>
      <div id="authActionText"></div>
    </div>
  </div>

  <main class="chat-main">
    <div class="chat-container card" style="padding:0">
      <header class="chat-header">
        <div style="display:flex; align-items:center; gap:12px;">
          <div style="font-size:1.5rem">🌿</div>
          <div>
            <div style="font-weight:700; font-size:0.9375rem">NeuroTrack Guide</div>
            <div style="font-size:0.7rem; color:var(--success); display:flex; align-items:center; gap:4px;">
              <span style="width:6px; height:6px; background:currentColor; border-radius:50%"></span> AI Active
            </div>
          </div>
        </div>
        <button class="btn-ghost" id="clearBtn">Clear Chat</button>
      </header>

      <div class="chat-messages" id="chatMessages">
        <div style="text-align:center; padding:40px 20px; color:var(--text-muted)">
          <div style="font-size:3rem; margin-bottom:16px;">💬</div>
          <h3>Start a conversation</h3>
          <p style="font-size:0.875rem">I'm here to listen. How are you feeling today?</p>
          <div class="quick-chips">
            <span class="chip" data-msg="I'm feeling a bit overwhelmed lately.">Feeling overwhelmed</span>
            <span class="chip" data-msg="Can you help me with some relaxation techniques?">Relaxation tips</span>
            <span class="chip" data-msg="I've been having trouble sleeping.">Trouble sleeping</span>
          </div>
        </div>
      </div>

      <div id="thinking" class="thinking" style="display:none">NeuroTrack is thinking...</div>

      <footer class="chat-input-area">
        <div class="input-wrapper">
          <textarea id="msgInput" placeholder="Type your message..." rows="1"></textarea>
          <button class="btn-send" id="sendBtn" aria-label="Send message">➤</button>
        </div>
      </footer>
    </div>
  </main>

  <div id="toast-container"></div>

  <script type="module">
    import { auth, sendChat, getUserId, showToast, formatDate } from './js/api.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    // ── Theme Manager ─────────────────────────────────────────────────────────
    const themeToggle = document.getElementById('themeToggle');
    

    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    themeToggle.onclick = () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    };
    

    // ── Auth Init ─────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      document.getElementById('userDisplayName').textContent = user ? user.email : 'Guest Mode';
    });

    const chatMessages = document.getElementById('chatMessages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    let conversation = JSON.parse(sessionStorage.getItem('nt_chat') || '[]');

    function renderChat() {
      if (!conversation.length) return;
      chatMessages.innerHTML = conversation.map(m => {
        const content = m.role === 'ai' 
          ? marked.parse(m.text) 
          : m.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        return `
        <div class="bubble ${m.role}">
          ${content}
          <span class="bubble-time">${m.time}</span>
        </div>
        `;
      }).join('');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function handleSend() {
      const text = msgInput.value.trim();
      if (!text) return;

      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      conversation.push({ role: 'user', text, time });
      msgInput.value = '';
      msgInput.style.height = 'auto';
      renderChat();
      
      document.getElementById('thinking').style.display = 'block';
      chatMessages.scrollTop = chatMessages.scrollHeight;

      try {
        const res = await sendChat(getUserId(), text);
        const aiTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        conversation.push({ role: 'ai', text: res.reply, time: aiTime });
        sessionStorage.setItem('nt_chat', JSON.stringify(conversation));
        renderChat();
      } catch (e) {
        showToast('Failed to get response', 'error');
      } finally {
        document.getElementById('thinking').style.display = 'none';
      }
    }

    sendBtn.onclick = handleSend;
    msgInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
    msgInput.oninput = () => { msgInput.style.height = 'auto'; msgInput.style.height = msgInput.scrollHeight + 'px'; };

    document.getElementById('clearBtn').onclick = () => {
      if(confirm('Clear this conversation?')) {
        conversation = [];
        sessionStorage.removeItem('nt_chat');
        location.reload();
      }
    };

    document.querySelectorAll('.chip').forEach(c => {
      c.onclick = () => { msgInput.value = c.dataset.msg; handleSend(); };
    });

    renderChat();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const navToggle = document.getElementById('navToggle');
      const navLinks = document.getElementById('navLinks');
      if(navToggle && navLinks) {
        navToggle.addEventListener('click', () => {
          navLinks.classList.toggle('show');
          navToggle.textContent = navLinks.classList.contains('show') ? '✕' : '☰';
        });
        document.querySelectorAll('.nav-links a').forEach(link => {
          link.addEventListener('click', () => {
            navLinks.classList.remove('show');
            navToggle.textContent = '☰';
          });
        });
      }
    });
  </script>
</body>
</html>
